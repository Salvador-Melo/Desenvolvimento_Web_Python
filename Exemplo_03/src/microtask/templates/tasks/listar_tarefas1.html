<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Lista de tarefas</title>
  </head>
  <body>
    <h1>Lista de tarefas</h1>

    {% if tarefas %}
      <ul>
        {% for t in tarefas %}
          <li>{{ t }}</li>
        {% endfor %}
      </ul>
    {% else %}
      <p>Nenhuma tarefa cadastrada.</p>
    {% endif %}
  </body>
</html>
